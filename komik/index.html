<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Membaca Komik - Miyamura Comic</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <h1 id="manga-title">Memuat Komik...</h1>
      <nav>
        <a href="../index.html">Home</a>
        <a href="../profil.html">Profil Saya</a>
      </nav>
    </header>

    <main class="reader-container">
      <div class="reader-nav">
        <button id="prev-ch-btn" onclick="pindahChapter(-1)">
          ◀ Prev Chapter
        </button>
        <span id="current-chapter-text">Chapter --</span>
        <button id="next-ch-btn" onclick="pindahChapter(1)">
          Next Chapter ▶
        </button>
      </div>

      <div id="chapter-images-container" class="images-stack">
        <p id="loading-status">Sedang mengambil lembar halaman...</p>
      </div>

      <div class="reader-nav" style="margin-top: 30px">
        <button id="prev-ch-btn-bottom" onclick="pindahChapter(-1)">
          ◀ Prev Chapter
        </button>
        <button id="next-ch-btn-bottom" onclick="pindahChapter(1)">
          Next Chapter ▶
        </button>
      </div>
    </main>

    <script src="../js/reader.js"></script>
  </body>
</html>
