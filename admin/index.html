<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Miyamura Comic</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="admin-container">
      <div id="login-section" class="card">
        <h2>Login Admin</h2>
        <p>
          Masukkan GitHub Personal Access Token Anda untuk mengelola website.
        </p>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
        <button onclick="loginAdmin()">Masuk Panel</button>
      </div>

      <div id="dashboard-section" class="card" style="display: none">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h2>Panel Kendali Admin</h2>
          <button onclick="logoutAdmin()" class="btn-danger">Keluar</button>
        </div>
        <hr />

        <h3>Input / Update Komik & Chapter Baru</h3>
        <div class="form-group">
          <label>Judul Komik:</label>
          <input
            type="text"
            id="komik-title"
            placeholder="Contoh: Solo Leveling"
          />
        </div>
        <div class="form-group">
          <label>Slug Komik (URL Folder):</label>
          <input
            type="text"
            id="komik-slug"
            placeholder="Contoh: solo-leveling"
          />
        </div>
        <div class="form-group">
          <label>API Key ImgBB:</label>
          <input
            type="text"
            id="imgbb-key"
            placeholder="Masukkan API Key ImgBB"
          />
        </div>
        <div class="form-group">
          <label>Upload Gambar Cover (Hanya jika Komik Baru):</label>
          <input type="file" id="komik-cover" />
        </div>

        <hr />
        <h4>Bagian Rilis Chapter</h4>
        <div class="form-group">
          <label>Nomor Chapter:</label>
          <input
            type="number"
            id="chapter-number"
            placeholder="Contoh: 1"
            min="1"
          />
        </div>
        <div class="form-group">
          <label>Pilih Gambar Isi Chapter (Bisa pilih banyak sekaligus):</label>
          <input type="file" id="chapter-images" multiple />
        </div>

        <button
          onclick="handleProsesRilis()"
          class="btn-primary"
          style="width: 100%; padding: 12px; margin-top: 15px"
        >
          Proses & Amankan ke GitHub API
        </button>

        <div id="progress-container" style="margin-top: 15px; display: none">
          <p id="status-log" style="font-weight: bold; color: #0076ff"></p>
        </div>
      </div>

      <hr style="margin: 30px 0; border-top: 2px dashed #ccc" />

      <h3>Tambah Berita / Blog Baru</h3>
      <div class="form-group">
        <label>Judul Berita:</label>
        <input
          type="text"
          id="berita-title"
          placeholder="Contoh: Manhwa Solo Leveling Dapatkan Adaptasi Game Baru!"
        />
      </div>
      <div class="form-group">
        <label>Slug Berita (URL Artikel):</label>
        <input
          type="text"
          id="berita-slug"
          placeholder="Contoh: game-baru-solo-leveling"
        />
      </div>
      <div class="form-group">
        <label>Ringkasan Pendek (Muncul di Halaman Depan):</label>
        <input
          type="text"
          id="berita-summary"
          placeholder="Tulis ringkasan singkat artikel..."
        />
      </div>
      <div class="form-group">
        <label>Upload Gambar Artikel / Thumbnail (ImgBB):</label>
        <input type="file" id="berita-thumbnail" />
      </div>
      <div class="form-group">
        <label>Isi Berita / Konten Lengkap:</label>
        <textarea
          id="berita-content"
          rows="10"
          style="width: 100%; padding: 8px; box-sizing: border-box"
          placeholder="Tulis artikel kamu di sini... Bisa menggunakan tag HTML seperti <br> atau <p> untuk paragraf baru."
        ></textarea>
      </div>

      <button
        onclick="handleProsesBerita()"
        class="btn-primary"
        style="
          width: 100%;
          padding: 12px;
          margin-top: 15px;
          background-color: #28a745;
        "
      >
        Publish Berita ke GitHub
      </button>
    </div>

    <script src="../js/admin.js"></script>
  </body>
</html>
